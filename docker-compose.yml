services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: analytics
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics -d analytics"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://analytics:analytics@postgres:5432/analytics
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: replace-this-secret
      FRONTEND_ORIGIN: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: ./backend
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://analytics:analytics@postgres:5432/analytics
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: replace-this-secret
    depends_on:
      - api
      - redis

  beat:
    build:
      context: ./backend
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://analytics:analytics@postgres:5432/analytics
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: replace-this-secret
    depends_on:
      - api
      - redis

volumes:
  postgres-data:
