services:
  - type: web
    name: atlas-analytics-api
    env: docker
    rootDir: backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FRONTEND_ORIGIN
        value: https://your-frontend.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: atlas-analytics-db
          property: connectionString

databases:
  - name: atlas-analytics-db
    plan: free
